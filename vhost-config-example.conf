# =====================================================================
# Apache virtual host configuration for alumni.ds.uth.gr
# Append this to:
#   Windows : C:\xampp\apache\conf\extra\httpd-vhosts.conf
#   macOS   : /Applications/XAMPP/etc/extra/httpd-vhosts.conf
#   Linux   : /opt/lampp/etc/extra/httpd-vhosts.conf
# Then add `127.0.0.1 alumni.ds.uth.gr` to your hosts file and restart Apache.
# =====================================================================

# Keep your default localhost vhost first (so http://localhost/ still works)
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "C:/xampp/htdocs"
</VirtualHost>

# --- Alumni site --------------------------------------------------------
<VirtualHost *:80>
    ServerName alumni.ds.uth.gr
    DocumentRoot "C:/xampp/htdocs/alumni-app"

    <Directory "C:/xampp/htdocs/alumni-app">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  "logs/alumni-error.log"
    CustomLog "logs/alumni-access.log" combined
</VirtualHost>
